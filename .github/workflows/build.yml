name: Build (CUDA + Vulkan)

on:
  push:
    branches: [ master, nv-render ]
    paths-ignore:
      - 'README.md'
      - 'docs/**'
      - '.github/**'
  pull_request:
    branches: [ master ]
    paths-ignore:
      - 'README.md'
      - 'docs/**'
      - '.github/**'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build (${{ matrix.configuration }})
    runs-on: windows-2025-vs2026

    strategy:
      fail-fast: false
      matrix:
        configuration: [ Debug, Release ]

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      # ── Build Dependencies: CUDA 13.3 + Vulkan 1.4 + OptiX (best-effort) ──
      - name: Setup Build Dependencies
        uses: ./.github/actions/setup-deps

      # ── xmake ──
      - name: Setup xmake
        uses: xmake-io/github-action-setup-xmake@v1
        with:
          xmake-version: latest

      # ── Build ──
      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: amd64

      - name: Build (Debug)
        if: matrix.configuration == 'Debug'
        shell: pwsh
        run: |
          xmake f -m debug -y
          xmake build

      - name: Build (Release)
        if: matrix.configuration == 'Release'
        shell: pwsh
        run: |
          xmake f -m release -y
          xmake build

      # ── Locate actual xmake output directory (Release) ──
      - name: Locate Build Output (Release)
        if: matrix.configuration == 'Release'
        id: locate
        shell: pwsh
        run: |
          # Search for the built exe, filtering out Debug variants
          $exe = Get-ChildItem -Path . -Recurse -Filter "RayTracing.exe" `
            | Where-Object { $_.FullName -notmatch '\\(Debug|debug)\\' } `
            | Select-Object -First 1

          if (-not $exe) {
            Write-Error "RayTracing.exe not found after Release build!"
            exit 1
          }

          $buildDir = $exe.DirectoryName
          # Normalize slashes for GitHub Actions path compatibility
          $buildDirNormalized = $buildDir -replace '\\', '/'
          Write-Host "Build output: $buildDir"
          echo "build_dir=$buildDir" >> $env:GITHUB_OUTPUT
          echo "build_dir_normalized=$buildDirNormalized" >> $env:GITHUB_OUTPUT

      # ── Bundle runtime DLLs into build output (Release only) ──
      - name: Collect Runtime DLLs (Release)
        if: matrix.configuration == 'Release'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Continue"
          $buildDir = "${{ steps.locate.outputs.build_dir }}"

          # Vulkan runtime — search SDK tree (CI), then System32 (driver fallback)
          $vulkanDll = Get-ChildItem "$env:VULKAN_SDK" -Recurse -Filter "vulkan-1.dll" -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $vulkanDll) {
            $vulkanDll = Get-ChildItem "C:\Windows\System32" -Filter "vulkan-1.dll" -ErrorAction SilentlyContinue | Select-Object -First 1
          }
          if ($vulkanDll) {
            Copy-Item $vulkanDll.FullName $buildDir\
            Write-Host "Bundled: vulkan-1.dll (from $($vulkanDll.DirectoryName))"
          } else {
            Write-Warning "vulkan-1.dll not found — user will need Vulkan runtime installed"
          }

          # CUDA runtime (only if WL_CUDA was enabled)
          $cudaBin = "$env:CUDA_PATH\bin"
          if (Test-Path $cudaBin) {
            Get-ChildItem "$cudaBin\cudart64_*.dll" -ErrorAction SilentlyContinue | ForEach-Object {
              Copy-Item $_.FullName $buildDir\
              Write-Host "Bundled: $($_.Name)"
            }
          }

          # MSVC runtime (vcruntime + msvcp)
          try {
            $vsPath = & "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe" -latest -property installationPath
            $redistDirs = Get-ChildItem "$vsPath\VC\Redist\MSVC" -Directory -ErrorAction SilentlyContinue | Sort-Object Name -Descending
            $redistDir = $redistDirs | Select-Object -First 1
            if ($redistDir) {
              $crtDir = "$($redistDir.FullName)\x64\Microsoft.VC143.CRT"
              if (Test-Path "$crtDir\vcruntime140.dll") {
                Copy-Item "$crtDir\vcruntime140.dll" $buildDir\
                Copy-Item "$crtDir\msvcp140.dll" $buildDir\
                Write-Host "Bundled: vcruntime140.dll, msvcp140.dll"
              }
            }
          } catch {
            Write-Warning "MSVC runtime DLL collection failed: $_"
          }

          # ── Build metadata (for CD verification) ──
          $buildDate  = (Get-Date).ToString("yyyy-MM-ddTHH:mm:ssZ")
          $wlCuda     = [bool](Test-Path env:CUDA_PATH)
          $wlOptix    = Test-Path "C:\OptiXSDK\include\optix.h"
          $wlIspc     = Test-Path "vendor\ispc\bin\ispc.exe"
          $commitSha  = (git rev-parse --short HEAD) ?? "unknown"

          $metaPath = Join-Path $buildDir "build-info.txt"
          @" 
          build_date=$buildDate
          wl_cuda=$wlCuda
          wl_optix=$wlOptix
          wl_ispc=$wlIspc
          commit_sha=$commitSha
          "@.Trim() | Out-File $metaPath -Encoding UTF8
          Write-Host "build-info.txt written: CUDA=$wlCuda, OptiX=$wlOptix, ISPC=$wlIspc"

      - name: Verify Build Output
        shell: pwsh
        run: |
          $config = '${{ matrix.configuration }}'
          $buildDir = if ($config -eq 'Release') { "${{ steps.locate.outputs.build_dir }}" } else { "bin\$config-windows-x86_64\RayTracing" }
          if (Test-Path $buildDir) {
            Write-Host "Build output: $buildDir"
            Get-ChildItem $buildDir -Recurse | ForEach-Object { Write-Host $_.FullName }
          } else {
            Write-Host "Searching for build output..."
            Get-ChildItem . -Recurse -Filter "*.exe" | ForEach-Object { Write-Host $_.FullName }
          }

      - name: Upload Build Artifacts
        if: matrix.configuration == 'Release'
        uses: actions/upload-artifact@v4
        with:
          name: RayTracing-Release
          path: ${{ steps.locate.outputs.build_dir_normalized }}/
          if-no-files-found: error

  # ── Unit Tests (parallel with build, glm-only — no CUDA/OptiX/Vulkan needed) ──
  test:
    name: Test (${{ matrix.configuration }})
    runs-on: windows-2025-vs2026

    strategy:
      fail-fast: false
      matrix:
        configuration: [ Debug, Release ]

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup xmake
        uses: xmake-io/github-action-setup-xmake@v1
        with:
          xmake-version: latest

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: amd64

      - name: Build and Run Tests
        shell: pwsh
        run: |
          xmake f -m ${{ matrix.configuration }} -y
          xmake build RayTracing_test
          xmake run RayTracing_test

  # ── CD: trigger release workflow after successful build on master ──
  release:
    name: Trigger CD Release
    needs: [build, test]
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    uses: ./.github/workflows/release.yml
    permissions:
      contents: write
    with:
      build-run-id: ${{ github.run_id }}
