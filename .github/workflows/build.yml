name: Build (CUDA + Vulkan)

on:
  push:
    branches: [ master, nv-render ]
    paths-ignore:
      - 'README.md'
      - 'docs/**'
      - '.github/**'
  pull_request:
    branches: [ master ]
    paths-ignore:
      - 'README.md'
      - 'docs/**'
      - '.github/**'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build (${{ matrix.configuration }})
    runs-on: windows-2025-vs2026

    strategy:
      fail-fast: false
      matrix:
        configuration: [ Debug, Release ]

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      # ── Build Dependencies: CUDA 13.3 + Vulkan 1.4 + OptiX (best-effort) ──
      - name: Setup Build Dependencies
        uses: ./.github/actions/setup-deps

      # ── xmake ──
      - name: Setup xmake
        uses: xmake-io/github-action-setup-xmake@v1
        with:
          xmake-version: latest

      # ── Build ──
      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: amd64

      - name: Build (Debug)
        if: matrix.configuration == 'Debug'
        shell: pwsh
        run: |
          xmake f -m debug
          xmake build

      - name: Build (Release)
        if: matrix.configuration == 'Release'
        shell: pwsh
        run: |
          xmake f -m release
          xmake build

      # ── Bundle runtime DLLs into build output (Release only) ──
      - name: Collect Runtime DLLs (Release)
        if: matrix.configuration == 'Release'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Continue"
          $buildDir = "bin\Release-windows-x86_64\RayTracing"

          # Vulkan runtime
          $vulkanDll = "$env:VULKAN_SDK\Bin\vulkan-1.dll"
          if (Test-Path $vulkanDll) {
            Copy-Item $vulkanDll $buildDir\
            Write-Host "Bundled: vulkan-1.dll"
          } else {
            Write-Warning "vulkan-1.dll not found at $vulkanDll"
          }

          # CUDA runtime (only if WL_CUDA was enabled)
          $cudaBin = "$env:CUDA_PATH\bin"
          if (Test-Path $cudaBin) {
            Get-ChildItem "$cudaBin\cudart64_*.dll" -ErrorAction SilentlyContinue | ForEach-Object {
              Copy-Item $_.FullName $buildDir\
              Write-Host "Bundled: $($_.Name)"
            }
          }

          # MSVC runtime (vcruntime + msvcp)
          try {
            $vsPath = & "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe" -latest -property installationPath
            $redistDirs = Get-ChildItem "$vsPath\VC\Redist\MSVC" -Directory -ErrorAction SilentlyContinue | Sort-Object Name -Descending
            $redistDir = $redistDirs | Select-Object -First 1
            if ($redistDir) {
              $crtDir = "$($redistDir.FullName)\x64\Microsoft.VC143.CRT"
              if (Test-Path "$crtDir\vcruntime140.dll") {
                Copy-Item "$crtDir\vcruntime140.dll" $buildDir\
                Copy-Item "$crtDir\msvcp140.dll" $buildDir\
                Write-Host "Bundled: vcruntime140.dll, msvcp140.dll"
              }
            }
          } catch {
            Write-Warning "MSVC runtime DLL collection failed: $_"
          }

          # ── Build metadata (for CD verification) ──
          $buildDate  = (Get-Date).ToString("yyyy-MM-ddTHH:mm:ssZ")
          $wlCuda     = [bool](Test-Path env:CUDA_PATH)
          $wlOptix    = Test-Path "C:\OptiXSDK\include\optix.h"
          $wlIspc     = Test-Path "vendor\ispc\bin\ispc.exe"
          $commitSha  = (git rev-parse --short HEAD) ?? "unknown"

          @" 
          build_date=$buildDate
          wl_cuda=$wlCuda
          wl_optix=$wlOptix
          wl_ispc=$wlIspc
          commit_sha=$commitSha
          "@.Trim() | Out-File "$buildDir\build-info.txt" -Encoding UTF8
          Write-Host "build-info.txt written: CUDA=$wlCuda, OptiX=$wlOptix, ISPC=$wlIspc"

      - name: Verify Build Output
        shell: pwsh
        run: |
          $config = '${{ matrix.configuration }}'
          $buildDir = "bin\$config-windows-x86_64\RayTracing"
          if (Test-Path $buildDir) {
            Write-Host "Build output directory exists: $buildDir"
            Get-ChildItem $buildDir -Recurse | ForEach-Object { Write-Host $_.FullName }
          } else {
            Write-Host "Searching for build output..."
            Get-ChildItem bin -Recurse -Filter "*.exe" | ForEach-Object { Write-Host $_.FullName }
          }

      - name: Upload Build Artifacts
        if: matrix.configuration == 'Release'
        uses: actions/upload-artifact@v4
        with:
          name: RayTracing-Release
          path: bin/Release-windows-x86_64/RayTracing/
          if-no-files-found: warn
