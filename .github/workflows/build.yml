name: Build (CUDA + Vulkan)

on:
  push:
    branches: [ master, nv-render ]
    paths-ignore:
      - 'README.md'
      - 'docs/**'
      - '.github/**'
  pull_request:
    branches: [ master ]
    paths-ignore:
      - 'README.md'
      - 'docs/**'
      - '.github/**'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build (${{ matrix.configuration }})
    runs-on: windows-2025-vs2026

    strategy:
      fail-fast: false
      matrix:
        configuration: [ Debug, Release ]

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      # ── CUDA: manual caching to avoid ~3GB download every run ──
      - name: Cache CUDA Toolkit
        id: cache-cuda
        uses: actions/cache@v4
        with:
          path: C:\Program Files\NVIDIA GPU Computing Toolkit\CUDA\v13.3
          key: cuda-13.3.0-windows-2025-vs2026-v1

      # ── CUDA: install only on cache miss ──
      # Uses mjun0812/setup-cuda (not Jimver/cuda-toolkit) because Jimver
      # caps at 13.2, while setup-cuda resolves versions dynamically from
      # NVIDIA's CDN, supporting 13.3+.
      - name: Install CUDA Toolkit
        if: steps.cache-cuda.outputs.cache-hit != 'true'
        uses: mjun0812/setup-cuda@v1
        with:
          version: '13.3'
          method: 'auto'

      # ── CUDA: set environment even on cache hit ──
      - name: Set CUDA Environment
        shell: pwsh
        run: |
          $cudaPath = "C:\Program Files\NVIDIA GPU Computing Toolkit\CUDA\v13.3"
          echo "CUDA_PATH=$cudaPath" >> $env:GITHUB_ENV
          echo "$cudaPath\bin" >> $env:GITHUB_PATH

      - name: Verify CUDA Installation
        shell: pwsh
        run: |
          nvcc --version 2>&1 || Write-Warning "nvcc not found — building CPU-only"

      # ── Vulkan SDK ──
      - name: Cache Vulkan SDK
        id: cache-vulkan
        uses: actions/cache@v4
        with:
          path: C:\VulkanSDK\1.4.309.0
          key: vulkan-1.4.309.0-windows-2025-vs2026-v1

      - name: Install Vulkan SDK
        if: steps.cache-vulkan.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          $vulkanVersion = "1.4.309.0"
          $installerUrl = "https://sdk.lunarg.com/sdk/download/$vulkanVersion/windows/VulkanSDK-$vulkanVersion-Installer.exe"
          $installerPath = "$env:RUNNER_TEMP\VulkanSDK.exe"
          Invoke-WebRequest -Uri $installerUrl -OutFile $installerPath
          Start-Process -FilePath $installerPath -ArgumentList "--accept-licenses --default-answer --confirm-command install" -Wait -NoNewWindow
          echo "VULKAN_SDK=C:\VulkanSDK\$vulkanVersion" >> $env:GITHUB_ENV

      - name: Set Vulkan Environment
        if: steps.cache-vulkan.outputs.cache-hit == 'true'
        shell: pwsh
        run: |
          echo "VULKAN_SDK=C:\VulkanSDK\1.4.309.0" >> $env:GITHUB_ENV

      # ── xmake ──
      - name: Setup xmake
        uses: xmake-io/github-action-setup-xmake@v1
        with:
          xmake-version: latest

      # ── Build ──
      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: amd64

      - name: Build (Debug)
        if: matrix.configuration == 'Debug'
        shell: pwsh
        run: |
          xmake f -m debug
          xmake build

      - name: Build (Release)
        if: matrix.configuration == 'Release'
        shell: pwsh
        run: |
          xmake f -m release
          xmake build

      - name: Verify Build Output
        shell: pwsh
        run: |
          $config = '${{ matrix.configuration }}'
          $buildDir = "bin\$config-windows-x86_64\RayTracing"
          if (Test-Path $buildDir) {
            Write-Host "Build output directory exists: $buildDir"
            Get-ChildItem $buildDir -Recurse | ForEach-Object { Write-Host $_.FullName }
          } else {
            Write-Host "Searching for build output..."
            Get-ChildItem bin -Recurse -Filter "*.exe" | ForEach-Object { Write-Host $_.FullName }
          }

      - name: Upload Build Artifacts
        if: matrix.configuration == 'Release'
        uses: actions/upload-artifact@v4
        with:
          name: RayTracing-Release
          path: bin/Release-windows-x86_64/RayTracing/
          if-no-files-found: warn
