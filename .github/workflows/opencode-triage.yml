name: Issue Triage

on:
  issues:
    types: [opened]

jobs:
  triage:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      issues: write   # Allow commenting guidance on issues
    steps:
      - name: Check account age
        id: check
        uses: actions/github-script@v7
        with:
          script: |
            const user = await github.rest.users.getByUsername({
              username: context.payload.issue.user.login
            });
            const created = new Date(user.data.created_at);
            const days = (Date.now() - created) / (1000 * 60 * 60 * 24);
            return days >= 30;
          result-encoding: string

      - uses: actions/checkout@v6
        if: steps.check.outputs.result == 'true'
        with:
          persist-credentials: false

      - name: Install opencode
        if: steps.check.outputs.result == 'true'
        run: curl -fsSL https://opencode.ai/install | bash

      - name: Run opencode triage
        if: steps.check.outputs.result == 'true'
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MODEL: deepseek/deepseek-v4-flash
          USE_GITHUB_TOKEN: true
          PROMPT: |
            Review this issue and provide guidance ONLY.
            - Do NOT create pull requests or push code
            - If the issue describes a bug, suggest a fix approach
            - Provide documentation links or error handling guidance
            - Be helpful but read-only
          AGENT: plan
        run: opencode github run
