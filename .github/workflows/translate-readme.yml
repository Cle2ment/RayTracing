name: Translate README

on:
  push:
    branches: [master]
    paths:
      - 'README.md'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  translate:
    name: Translate README to Chinese
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect README.md Change
        id: detect
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            # Manual trigger: always translate, no detection needed
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "workflow_dispatch — will translate"
            exit 0
          fi
          # Push event: check if README.md was actually changed
          BASE="${{ github.event.before }}"
          if [[ -z "$BASE" || "$BASE" == "0000000000000000000000000000000000000000" ]]; then
            BASE="HEAD~1"
          fi
          if git diff --name-only "$BASE" HEAD | grep -q "^README.md$"; then
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "README.md changed — will translate"
          else
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "README.md not changed — skipping"
          fi

      - name: Setup Python
        if: steps.detect.outputs.changed == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Dependencies
        if: steps.detect.outputs.changed == 'true'
        shell: bash
        run: pip install openai

      - name: Run Translation
        if: steps.detect.outputs.changed == 'true'
        shell: bash
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: python .github/scripts/translate_readme.py

      - name: Commit Translation
        if: steps.detect.outputs.changed == 'true'
        shell: bash
        run: |
          # git diff only works on tracked files; use status for new files too
          if git status --porcelain docs/README_zh-CN.md | grep -q .; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add docs/README_zh-CN.md
            git commit -m "docs: auto-translate README to Chinese [skip ci]"
            git push
          else
            echo "No changes to commit"
          fi
